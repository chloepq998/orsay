<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>수학 문제 분석 기록</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>수학 문제 분석 기록</h1>
  <nav id="mainNav">
    <button data-target="screen-input" class="nav-btn active">문제 기록 입력</button>
    <button data-target="screen-analysis" class="nav-btn">분석 결과</button>
    <button data-target="screen-stats" class="nav-btn">약점 통계</button>
    <button data-target="screen-review" class="nav-btn">복습 목록</button>
  </nav>
</header>

<main>
  <section id="screen-input" class="screen active">
    <form id="recordForm">
      <fieldset>
        <legend>기본 정보</legend>
        <label>출처
          <input type="text" id="source" placeholder="교재명 / 시험명">
        </label>
        <label>번호
          <input type="text" id="problemNumber">
        </label>
        <label>단원
          <input type="text" id="unit">
        </label>
      </fieldset>

      <fieldset>
        <legend>사진으로 조건 읽기 (참고용 — 저장되지 않음)</legend>
        <label>사진 선택
          <input type="file" accept="image/*" capture="environment" id="ocrInput">
        </label>
        <p id="ocrStatus" class="status-text"></p>
        <textarea id="ocrScratch" rows="4" placeholder="사진에서 추출된 텍스트가 여기 표시됩니다. 참고만 하고 아래 항목에 직접 정리해서 입력하세요."></textarea>
      </fieldset>

      <fieldset>
        <legend>문제 분석</legend>

        <label>핵심 조건 요약
          <textarea id="keyConditions" rows="2" placeholder="이 문제에서 결정적인 조건은 무엇인가"></textarea>
        </label>

        <label>출제 의도
          <input type="text" id="intentInput" list="intentSuggestions" placeholder="이 문제는 어떤 개념/발상을 묻는가 (기존 패턴이 있으면 자동완성)">
          <datalist id="intentSuggestions"></datalist>
        </label>

        <label>필요한 첫 발상
          <textarea id="firstApproach" rows="2" placeholder="출제자가 어떤 발상을 유도하는가"></textarea>
        </label>

        <div class="condition-roles">
          <span>조건별 역할</span>
          <div class="cr-inputs">
            <input type="text" id="crCondition" placeholder="조건">
            <input type="text" id="crRole" placeholder="이 조건의 역할">
            <button type="button" id="crAddBtn">추가</button>
          </div>
          <ul id="crList"></ul>
        </div>

        <label>주의할 함정
          <textarea id="trap" rows="2" placeholder="자주 하는 착각은 무엇인가"></textarea>
        </label>

        <label>내가 막힌 지점
          <textarea id="stuckPoint" rows="2"></textarea>
        </label>

        <label>틀린 이유 (서술)
          <textarea id="failureReason" rows="2"></textarea>
        </label>

        <label>틀린 이유 분류
          <select id="failureCategory">
            <option value="">선택 안 함</option>
          </select>
        </label>

        <label>다음에 비슷한 문제를 보면 볼 신호
          <textarea id="nextSignal" rows="2"></textarea>
        </label>

        <div class="tag-picker">
          <span>태그 (발상별 분류)</span>
          <div id="tagContainer"></div>
        </div>

        <label class="checkbox-label">
          <input type="checkbox" id="needsReview">
          복습 필요
        </label>
      </fieldset>

      <button type="submit">저장</button>
      <p id="saveStatus" class="status-text"></p>
    </form>
  </section>

  <section id="screen-analysis" class="screen">
    <h2>분석 결과</h2>
    <div id="recordList"></div>
  </section>

  <section id="screen-stats" class="screen">
    <h2>약점 통계</h2>
    <p class="stub-note">다음 단계에서 구현됩니다.</p>
  </section>

  <section id="screen-review" class="screen">
    <h2>복습 목록</h2>
    <p class="stub-note">다음 단계에서 구현됩니다.</p>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
