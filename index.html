<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>수학 문제 분석 기록</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>수학 문제 분석 기록</h1>
  <nav id="mainNav">
    <button data-target="screen-input" class="nav-btn active">문제 기록 입력</button>
    <button data-target="screen-analysis" class="nav-btn">분석 결과</button>
    <button data-target="screen-stats" class="nav-btn">약점 통계</button>
    <button data-target="screen-review" class="nav-btn">복습 목록</button>
  </nav>
</header>

<main>
  <section id="screen-input" class="screen active">
    <h2 id="formModeTitle">문제 기록 입력</h2>
    <form id="recordForm">
      <fieldset>
        <legend>기본 정보</legend>
        <label>출처
          <input type="text" id="source" list="sourceSuggestions" placeholder="교재명 / 시험명">
          <datalist id="sourceSuggestions"></datalist>
        </label>
        <label>번호
          <input type="text" id="problemNumber">
        </label>
        <label>과목
          <select id="subjectSelect">
            <option value="">선택</option>
          </select>
        </label>
        <label>대단원
          <select id="unitSelect">
            <option value="">과목을 먼저 선택하세요</option>
          </select>
        </label>
        <label>소단원
          <select id="subUnitSelect">
            <option value="">대단원을 먼저 선택하세요</option>
          </select>
        </label>
      </fieldset>

      <fieldset>
        <legend>사진으로 문제 읽기 (참고용 — 저장되지 않음)</legend>
        <label>사진 선택
          <input type="file" accept="image/*" capture="environment" id="ocrInput">
        </label>
        <textarea id="ocrScratch" rows="4" placeholder="AI 분석을 실행하면 사진에서 읽은 문제 텍스트가 여기 표시됩니다. 참고만 하고 아래 항목에 직접 정리해서 입력하세요."></textarea>
        <button type="button" id="aiAnalyzeBtn">AI로 출제 의도 분석 (초안 제안)</button>
        <p id="aiStatus" class="status-text"></p>
      </fieldset>

      <fieldset>
        <legend>문제 분석</legend>

        <label>핵심 조건 요약
          <input type="text" id="keyConditions" list="keyConditionsSuggestions" placeholder="이 문제에서 결정적인 조건은 무엇인가">
          <datalist id="keyConditionsSuggestions"></datalist>
        </label>

        <label>출제 의도
          <input type="text" id="intentInput" list="intentSuggestions" placeholder="이 문제는 어떤 개념/발상을 묻는가 (기존 패턴이 있으면 자동완성)">
          <datalist id="intentSuggestions"></datalist>
        </label>

        <label>필요한 첫 발상
          <input type="text" id="firstApproach" list="firstApproachSuggestions" placeholder="출제자가 어떤 발상을 유도하는가">
          <datalist id="firstApproachSuggestions"></datalist>
        </label>

        <div class="condition-roles">
          <span>조건별 역할 (사진을 AI로 분석하면 조건이 자동으로 채워집니다)</span>
          <div class="cr-inputs">
            <input type="text" id="crCondition" placeholder="조건 직접 추가">
            <input type="text" id="crRole" list="crRoleSuggestions" placeholder="이 조건의 역할">
            <datalist id="crRoleSuggestions"></datalist>
            <button type="button" id="crAddBtn">추가</button>
          </div>
          <ul id="crList"></ul>
          <p id="crHintStatus" class="status-text"></p>
        </div>

        <label>주의할 함정
          <input type="text" id="trap" list="trapSuggestions" placeholder="자주 하는 착각은 무엇인가">
          <datalist id="trapSuggestions"></datalist>
        </label>

        <label>내가 막힌 지점
          <input type="text" id="stuckPoint" list="stuckPointSuggestions">
          <datalist id="stuckPointSuggestions"></datalist>
        </label>

        <label>틀린 이유 (서술)
          <input type="text" id="failureReason" list="failureReasonSuggestions">
          <datalist id="failureReasonSuggestions"></datalist>
        </label>

        <label>틀린 이유 분류
          <select id="failureCategory">
            <option value="">선택 안 함</option>
          </select>
        </label>

        <label>다음에 비슷한 문제를 보면 볼 신호
          <input type="text" id="nextSignal" list="nextSignalSuggestions">
          <datalist id="nextSignalSuggestions"></datalist>
        </label>

        <div class="tag-picker">
          <span>태그 (발상별 분류)</span>
          <div id="tagContainer"></div>
        </div>

        <label class="checkbox-label">
          <input type="checkbox" id="needsReview">
          복습 필요
        </label>
      </fieldset>

      <div class="form-actions">
        <button type="submit" id="submitBtn">저장</button>
        <button type="button" id="cancelEditBtn" class="cancel-btn">취소</button>
      </div>
      <p id="saveStatus" class="status-text"></p>
    </form>
  </section>

  <section id="screen-analysis" class="screen">
    <h2>분석 결과</h2>
    <div id="recordList"></div>
  </section>

  <section id="screen-stats" class="screen">
    <h2>약점 통계</h2>
    <div class="stats-controls">
      <label>최근
        <select id="statsLimit">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="30">30</option>
          <option value="all">전체</option>
        </select>
        개 기준
      </label>
    </div>
    <div id="statsContent"></div>
  </section>

  <section id="screen-review" class="screen">
    <h2>복습 목록</h2>
    <div id="reviewList"></div>
  </section>
</main>

<script type="module" src="js/app.js"></script>
</body>
</html>
